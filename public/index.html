<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AmongDemons.com</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: 'Arial', sans-serif;
    }
    .container {
      text-align: center;
    }
    .mage-image {
      width: 400px;
      height: 400px;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- SVG Image displaying amongdemons.com -->
    <svg class="mage-image" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
      <!-- Background circle -->
      <circle cx="200" cy="200" r="195" fill="#1a1a2e"/>
      
      <!-- "A" letter -->
      <text x="70" y="220" font-family="Arial, sans-serif" font-size="80" font-weight="bold" fill="#e94560">A</text>
      
      <!-- "m" letters (stylized) -->
      <path d="M130 170 L110 200 L130 230 L110 260 L125 260 L145 230 L165 260 L180 260 L195 230 L215 260 L230 260 L245 230" fill="#e94560"/>
      
      <!-- "o" -->
      <circle cx="220" cy="210" r="30" fill="#1a1a2e"/>
      <text x="210" y="218" font-family="Arial, sans-serif" font-size="40" text-anchor="middle" fill="#ffffff">o</text>
      
      <!-- "n" -->
      <path d="M260 175 L250 230 L270 230 L280 180 L300 180" stroke="#e94560" stroke-width="8" fill="none"/>
      
      <!-- "d" -->
      <path d="M320 160 Q335 145 350 160 L345 195 Q325 175 310 195 Z M310 180 L315 230" fill="#e94560"/>
      <path d="M340 160 L345 130 L348 140 L355 130" stroke="#e94560" stroke-width="6" fill="none"/>
      
      <!-- ".com" -->
      <text x="340" y="250" font-family="Arial, sans-serif" font-size="30" fill="#00d4ff">.com</text>
    </svg>
  </div>
</body>
</html>
