<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
  <head>
    <link rel="icon" href="/app/images/amongdemons.ico" type="image/x-icon">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demon Type - Among Demons NFTs</title>
    <meta name="description" content="These models are part of the founders collection. The NFTs are minted and transacted on Stargaze from the Cosmos ecosystem.">

    <!-- Page Metadata Thumbnail -->
    <meta property="og:image" content="/app/images/demons/thumbnails/1.png">

    <!-- Bootstrap Icons SVG - Required for Bootstrap Icon classes -->
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/app/css/main.css" rel="stylesheet">
  </head>
  <body class="demon-type-page">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom">
      <div class="container-fluid">
        <a class="navbar-brand" href="/">
          <img src="/app/images/amongdemons_logo_250x250.png" alt="" class="d-inline-block align-middle me-2 logo-nav" style="width: 48px; height: 48px;">
          Among Demons
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav me-auto">
            <li class="nav-item dropdown">
              <a class="nav-link dropdown-toggle" href="#" id="demonsDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">Demons</a>
              <ul class="dropdown-menu dropdown-menu-end" id="demonTypesDropdown"></ul>
            </li>
            <li class="nav-item"><a class="nav-link" href="/play">Play</a></li>
            <li class="nav-item"><a class="nav-link" href="/dungeon">Dungeon</a></li>
            <li class="nav-item"><a class="nav-link" href="/collection">Collection</a></li>
            <li class="nav-item"><a class="nav-link" href="/rankings">Rankings</a></li>
          </ul>

          <div class="nav-auth-actions" data-nav-auth-actions>
            <a class="btn btn-outline-light btn-sm" href="/login">Login</a>
            <a class="btn btn-primary btn-sm" href="/register">Register</a>
          </div>
          <div class="nav-account d-none" data-nav-account>
            <span class="nav-wallet" id="navSoulBalance" data-nav-souls role="status" aria-live="polite" aria-atomic="true" title="Soul balance">
              <span class="soul-amount nav-soul-amount" aria-label="Souls loading">
                <img src="/app/images/assets/soul.svg" class="ad-icon soul-icon" alt="" aria-hidden="true">
                <span class="soul-amount-value">-</span>
                <span class="soul-amount-label">Souls</span>
              </span>
            </span>
            <span class="nav-player" title="Signed in player">
              <i data-lucide="user"></i>
              <span id="navPlayerName" data-nav-player-name></span>
            </span>
            <button class="btn nav-logout-btn btn-icon-only" id="logoutBtn" type="button" title="Logout" aria-label="Logout">
              <i data-lucide="log-out"></i>
            </button>
          </div>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="container my-4">

      <!-- Header Section: Navigation + Title + Subtitle -->
      <div class="demon-type-hero d-flex justify-content-between align-items-center py-3 mb-4">
        <span id="previous-type-slot">&nbsp;&nbsp;&nbsp;&nbsp;</span>

        <div class="demon-type-title-block">
          <h1 class="display-4" id="demon-title"></h1>
          <p class="mb-0 text-muted m-0">Demon Type <span id="type-number">1</span></p>
        </div>

        <span id="next-type-slot">&nbsp;&nbsp;&nbsp;&nbsp;</span>
      </div>

      <!-- Demons Grid -->
      <div class="row row-cols-1 row-cols-md-3 g-3 demon-card-grid" id="demons-grid"></div>

      <section class="demon-type-info mb-0" id="type-info-panel" aria-live="polite"></section>

      <!-- Pagination -->
      <nav aria-label="Page navigation" class="my-4">
        <ul class="pagination justify-content-center flex-wrap gap-1 pagination-sm-responsive" id="pagination"></ul>
      </nav>

    </main>

    <!-- Footer -->
    <footer class="py-3 mt-4 border-top">
      <div class="container text-center text-body-secondary">
        <p>&copy; 2026 Among Demons. All rights reserved.</p>
      </div>
    </footer>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/vendor/lucide/lucide.min.js"></script>
    <script src="/app/js/icons.js"></script>

    <!-- Client-side data loading -->
    <script src="/app/js/session.js"></script>
    <script src="/app/js/navigation.js"></script>
    <script src="/app/js/demon-cards.js"></script>
    <script src="/app/js/index.js"></script>
  </body>
</html>
