<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Settings | Among Demons</title>
    <meta name="description" content="Manage your private Among Demons player settings.">
    <link rel="canonical" href="https://amongdemons.com/settings">
    <link rel="icon" href="/app/images/amongdemons.ico" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/app/css/main.css?v=20260622-ui-fixes-v1" rel="stylesheet">
  </head>
  <body class="settings-page">
    <nav class="navbar navbar-expand-xl navbar-dark bg-dark border-bottom game-shell-nav" aria-label="Game navigation">
      <div class="container-fluid">
        <a class="navbar-brand game-shell-brand" href="/" aria-label="Among Demons home">
          <img src="/app/images/amongdemons_logo_250x250.png" alt="Among Demons logo" class="logo-nav" width="40" height="40" loading="eager">
          <span class="game-shell-brand-copy"><span class="game-shell-brand-name">Among Demons</span></span>
        </a>
        <button class="navbar-toggler game-shell-toggle" type="button" data-bs-toggle="collapse" data-bs-target="#settingsGameNav" aria-controls="settingsGameNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="settingsGameNav">
          <ul class="navbar-nav game-shell-tabs me-auto">
            <li class="nav-item"><a class="nav-link game-nav-link" href="/camp" data-game-route="camp"><i data-lucide="tent"></i><span>Camp</span></a></li>
            <li class="nav-item"><a class="nav-link game-nav-link" href="/dungeon" data-game-route="dungeon"><i data-lucide="swords"></i><span>Dungeon</span></a></li>
            <li class="nav-item"><a class="nav-link game-nav-link is-locked" href="#pvp" data-game-route="pvp" aria-disabled="true" data-disabled-link><i data-lucide="shield"></i><span>PVP</span></a></li>
            <li class="nav-item"><a class="nav-link game-nav-link" href="/demons" data-game-route="demons"><i data-lucide="skull"></i><span>Demons</span></a></li>
            <li class="nav-item"><a class="nav-link game-nav-link" href="/collection" data-game-route="collection"><i data-lucide="grid-3x3"></i><span>Collection</span></a></li>
            <li class="nav-item"><a class="nav-link game-nav-link" href="/rankings" data-game-route="rankings"><i data-lucide="trophy"></i><span>Rankings</span></a></li>
          </ul>
          <div class="nav-account d-none" data-nav-account>
            <span class="nav-balance" data-nav-souls role="status" aria-live="polite" aria-atomic="true" title="Soul balance">
              <span class="soul-amount nav-soul-amount" aria-label="Souls loading">
                <img src="/app/images/assets/soul.svg" class="ad-icon soul-icon" alt="" width="16" height="16" aria-hidden="true">
                <span class="soul-amount-value">-</span>
                <span class="soul-amount-label">Souls</span>
              </span>
            </span>
            <a class="nav-player" href="/camp" title="Go to camp">
              <span class="nav-player-avatar" aria-hidden="true"><img src="/app/images/demons/thumbnails/1.png" alt="" width="34" height="34" data-nav-profile-image></span>
              <span class="nav-player-copy"><span data-nav-player-name></span><small data-nav-player-level>Level -</small></span>
            </a>
            <a class="nav-settings-link active" href="/settings" title="Settings" aria-label="Settings" aria-current="page"><i data-lucide="settings"></i></a>
            <button class="btn nav-logout-btn" id="logoutBtn" type="button" title="Logout" aria-label="Logout"><i data-lucide="log-out"></i></button>
          </div>
        </div>
      </div>
    </nav>

    <main class="settings-shell">
      <header class="settings-hero">
        <span class="settings-kicker"><i data-lucide="settings"></i> Hunter controls</span>
        <h1>Settings</h1>
      </header>

      <section class="settings-section" aria-labelledby="profileSettingsHeading">
        <header class="settings-section-header">
          <span class="settings-section-icon" aria-hidden="true"><i data-lucide="user-round"></i></span>
          <div>
            <h2 id="profileSettingsHeading">Profile</h2>
            <p>Change the name other hunters see.</p>
          </div>
        </header>

        <form id="usernameForm" class="settings-form" novalidate>
          <div class="settings-field">
            <label class="form-label" for="settingsUsername">Username</label>
            <input class="form-control" id="settingsUsername" name="username" autocomplete="username" minlength="3" maxlength="64" aria-describedby="usernameHelp" required disabled>
            <div class="form-text" id="usernameHelp">Use between 3 and 64 characters.</div>
          </div>
          <div class="settings-form-footer">
            <p class="d-none settings-message" id="settingsMessage" role="status" aria-live="polite" aria-atomic="true"></p>
            <button class="btn btn-primary settings-submit" id="saveUsernameButton" type="submit" disabled>
              <i data-lucide="save"></i>
              <span id="saveUsernameLabel">Save</span>
            </button>
          </div>
        </form>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/vendor/lucide/lucide.min.js"></script>
    <script src="/app/js/icons.js?v=20260622-alerts-v1"></script>
    <script src="/app/js/api-config.js"></script>
    <script src="/app/js/session.js"></script>
    <script src="/app/js/navigation.js"></script>
    <script src="/app/js/settings-ui.js"></script>
  </body>
</html>
