<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
  <head>
    <link rel="icon" href="/app/images/amongdemons.ico" type="image/x-icon">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hunt - Among Demons</title>
    <meta name="description" content="Hunt demons in the Among Demons prototype.">
    <meta property="og:image" content="/app/images/demons/thumbnails/1.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/app/css/main.css" rel="stylesheet">
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom">
      <div class="container-fluid">
        <a class="navbar-brand" href="/">
          <img src="/app/images/amongdemons_logo_250x250.png" alt="" class="d-inline-block align-middle me-2 logo-nav" style="width: 48px; height: 48px;">
          Among Demons
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav me-auto">
            <li class="nav-item dropdown">
              <a class="nav-link dropdown-toggle" href="#" id="demonsDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">Demons</a>
              <ul class="dropdown-menu dropdown-menu-end" id="demonTypesDropdown"></ul>
            </li>
            <li class="nav-item"><a class="nav-link" href="/play">Play</a></li>
            <li class="nav-item"><a class="nav-link active" href="/hunt">Hunt</a></li>
            <li class="nav-item"><a class="nav-link" href="/rankings">Rankings</a></li>
          </ul>
          <div class="d-flex align-items-center gap-2">
            <span class="text-secondary" id="navPlayerName"></span>
            <button class="btn btn-outline-danger btn-sm" id="logoutBtn" type="button" title="Logout">
              <i class="bi bi-box-arrow-right"></i>
            </button>
          </div>
        </div>
      </div>
    </nav>

    <main class="container-fluid my-4 px-3 px-lg-4">
      <section class="row g-3 mb-4">
        <div class="col-12 col-xl-6">
          <div class="card h-100">
            <div class="card-header d-flex flex-wrap gap-2 justify-content-between align-items-center">
              <span id="huntTitle">Hunt</span>
              <div class="d-flex flex-wrap gap-2">
                <button class="btn btn-primary btn-sm" id="startRunBtn" type="button">
                  <i class="bi bi-play-fill"></i>
                  Start Hunt
                </button>
                <button class="btn btn-danger btn-sm" id="battleBtn" type="button">
                  <i class="bi bi-lightning-charge"></i>
                  Battle
                </button>
                <button class="btn btn-outline-warning btn-sm" id="endRunBtn" type="button">
                  <i class="bi bi-flag"></i>
                  End Hunt
                </button>
                <button class="btn btn-outline-light btn-sm" id="refreshBtn" type="button" title="Refresh">
                  <i class="bi bi-arrow-clockwise"></i>
                </button>
              </div>
            </div>
            <div class="card-body">
              <div id="runEmpty" class="empty-state">
                <img src="/app/images/demons/thumbnails/1.png" alt="">
                <p class="mb-0 text-muted">Start a hunt to face a team of demons.</p>
              </div>
              <div id="runPanel" class="d-none">
                <div class="row g-3 battle-board">
                  <div class="col-12 col-lg-6">
                    <h3 class="h6 text-muted">Your Team</h3>
                    <div class="row row-cols-1 row-cols-sm-2 g-3" id="teamGrid"></div>
                  </div>
                  <div class="col-12 col-lg-6">
                    <h3 class="h6 text-muted">Enemies</h3>
                    <div class="row row-cols-1 row-cols-sm-2 g-3" id="enemyGrid"></div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="col-12 col-xl-6">
          <div class="card h-100">
            <div class="card-header">Fight Log</div>
            <div class="card-body">
              <div id="fightLog" class="fight-log text-muted">Battle actions will appear here.</div>
            </div>
          </div>
        </div>

        <div class="col-12">
          <div class="card h-100">
            <div class="card-header">Rewards</div>
            <div class="card-body">
              <div id="rewardList" class="vstack gap-3"></div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="py-3 my-4 border-top">
      <div class="container text-center text-body-secondary">
        <p>&copy; 2026 Among Demons. All rights reserved.</p>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/app/js/navigation.js"></script>
    <script src="/app/js/session.js"></script>
    <script src="/app/js/hunt-ui.js"></script>
  </body>
</html>
