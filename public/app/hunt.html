<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
  <head>
    <link rel="icon" href="/app/images/amongdemons.ico" type="image/x-icon">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hunt Among Demons</title>
    <meta name="description" content="Hunt for these models as part of the founders collection. The NFTs are minted and transacted on Stargaze from the Cosmos ecosystem.">

    <!-- Page Metadata Thumbnail -->
    <meta property="og:image" content="/app/images/demons/thumbnails/1.png">

    <!-- Bootstrap Icons SVG - Required for Bootstrap Icon classes -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/app/css/main.css" rel="stylesheet">
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom">
      <div class="container-fluid">
        <a class="navbar-brand" href="/">
          <img src="/app/images/amongdemons_logo_250x250.png" alt="" class="d-inline-block align-middle me-2 logo-nav" style="width: 48px; height: 48px;">
          Among Demons
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav me-auto">
            <li class="nav-item dropdown">
              <a class="nav-link dropdown-toggle" href="#" id="demonsDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">Demons</a>
              <ul class="dropdown-menu dropdown-menu-end" id="demonTypesDropdown"></ul>
            </li>
          </ul>

          <!-- User Info and Logout -->
          <div class="d-flex align-items-center me-3 d-none">
            <span class="me-2">username</span>
            <span class="ms-2 text-secondary" title="Total souls collected in this session">12 souls</span>
            <a href="/logout" class="btn btn-outline-danger btn-sm ms-3" title="Logout">
              <i class="bi bi-box-arrow-right"></i>
            </a>
          </div>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="container my-4">

      <!-- Demons Grid -->
      <div class="row row-cols-3 g-3">
        <div class="col">
          <div class="card h-100">
            <img src="/app/images/demons/1.png" class="card-img-top" alt="- Hunt Demon 1">
            <div class="card-body text-center">
              <h5 class="card-title m-0 ad-common">Hunt Demon 1</h5>
            </div>
          </div>
        </div>
        <div class="col">
          <div class="card h-100">
            <img src="/app/images/demons/2.png" class="card-img-top" alt="- Hunt Demon 2">
            <div class="card-body text-center">
              <h5 class="card-title m-0 ad-common">Hunt Demon 2</h5>
            </div>
          </div>
        </div>
        <div class="col">
          <div class="card h-100">
            <img src="/app/images/demons/3.png" class="card-img-top" alt="- Hunt Demon 3">
            <div class="card-body text-center">
              <h5 class="card-title m-0 ad-common">Hunt Demon 3</h5>
            </div>
          </div>
        </div>
        <div class="col">
          <div class="card h-100">
            <img src="/app/images/demons/4.png" class="card-img-top" alt="- Hunt Demon 4">
            <div class="card-body text-center">
              <h5 class="card-title m-0 ad-common">Hunt Demon 4</h5>
            </div>
          </div>
        </div>
        <div class="col">
          <div class="card h-100">
            <img src="/app/images/demons/5.png" class="card-img-top" alt="- Hunt Demon 5">
            <div class="card-body text-center">
              <h5 class="card-title m-0 ad-common">Hunt Demon 5</h5>
            </div>
          </div>
        </div>
        <div class="col">
          <div class="card h-100">
            <img src="/app/images/demons/6.png" class="card-img-top" alt="- Hunt Demon 6">
            <div class="card-body text-center">
              <h5 class="card-title m-0 ad-common">Hunt Demon 6</h5>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="py-3 my-4 border-top">
      <div class="container text-center text-body-secondary">
        <p>&copy; 2026 Among Demons. All rights reserved.</p>
      </div>
    </footer>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/app/js/navigation.js"></script>
  </body>
</html>
