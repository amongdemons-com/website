<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>World | Among Demons</title>
    <meta name="description" content="Private Among Demons hunter exploration prototype.">
    <link rel="canonical" href="https://amongdemons.com/world">
    <link rel="icon" href="/app/images/amongdemons.ico" type="image/x-icon">
    <meta property="og:site_name" content="Among Demons">
    <meta property="og:type" content="website">
    <meta property="og:title" content="World | Among Demons">
    <meta property="og:description" content="Private Among Demons hunter exploration prototype.">
    <meta property="og:url" content="https://amongdemons.com/world">
    <meta property="og:image" content="https://amongdemons.com/app/images/assets/background/amongdemons_dungeon.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="World | Among Demons">
    <meta name="twitter:description" content="Private Among Demons hunter exploration prototype.">
    <meta name="twitter:image" content="https://amongdemons.com/app/images/assets/background/amongdemons_dungeon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/app/css/main.css?v=20260627-world-sheet-v1" rel="stylesheet">
  </head>
  <body class="world-page">
    <nav class="navbar navbar-expand-xl navbar-dark bg-dark border-bottom game-shell-nav" aria-label="Game navigation">
      <div class="container-fluid">
        <a class="navbar-brand game-shell-brand" href="/" aria-label="Among Demons home">
          <img src="/app/images/amongdemons_logo_250x250.png" alt="Among Demons logo" class="logo-nav" width="40" height="40" loading="eager">
          <span class="game-shell-brand-copy"><span class="game-shell-brand-name">Among Demons</span></span>
        </a>
        <button class="navbar-toggler game-shell-toggle" type="button" data-bs-toggle="collapse" data-bs-target="#worldGameNav" aria-controls="worldGameNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="worldGameNav">
          <ul class="navbar-nav game-shell-tabs me-auto">
            <li class="nav-item"><a class="nav-link game-nav-link active" href="/world" data-game-route="world" aria-current="page"><i data-lucide="map"></i><span>World</span></a></li>
            <li class="nav-item"><a class="nav-link game-nav-link" href="/camp" data-game-route="camp"><i data-lucide="tent"></i><span>Camp</span></a></li>
            <li class="nav-item"><a class="nav-link game-nav-link" href="/dungeon" data-game-route="dungeon"><i data-lucide="swords"></i><span>Dungeon</span></a></li>
            <li class="nav-item"><a class="nav-link game-nav-link" href="/demons" data-game-route="demons"><i data-lucide="skull"></i><span>Demons</span></a></li>
            <li class="nav-item"><a class="nav-link game-nav-link" href="/collection" data-game-route="collection"><i data-lucide="grid-3x3"></i><span>Collection</span></a></li>
            <li class="nav-item"><a class="nav-link game-nav-link" href="/rankings" data-game-route="rankings"><i data-lucide="trophy"></i><span>Rankings</span></a></li>
          </ul>
          <div class="nav-auth-actions game-shell-auth-actions d-none" data-nav-auth-actions>
            <a class="btn btn-outline-light btn-sm" href="/login">Login</a>
            <a class="btn btn-primary btn-sm" href="/register">Register</a>
          </div>
          <div class="nav-account d-none" data-nav-account>
            <span class="nav-balance" id="navSoulBalance" data-nav-souls role="status" aria-live="polite" aria-atomic="true" title="Soul balance">
              <span class="soul-amount nav-soul-amount" aria-label="Souls loading"><img src="/app/images/assets/soul.svg" class="ad-icon soul-icon" alt="" width="16" height="16" loading="lazy" aria-hidden="true"><span class="soul-amount-value">-</span><span class="soul-amount-label">Souls</span></span>
            </span>
            <a class="nav-player" href="/camp" title="Go to camp">
              <span class="nav-player-avatar" aria-hidden="true"><img src="/app/images/demons/thumbnails/1.png" alt="" width="34" height="34" loading="eager" data-nav-profile-image></span>
              <span class="nav-player-copy"><span id="navPlayerName" data-nav-player-name></span><small data-nav-player-level>Level -</small></span>
            </a>
            <a class="nav-settings-link" href="/settings" title="Settings" aria-label="Settings"><i data-lucide="settings"></i></a>
            <button class="btn nav-logout-btn" id="logoutBtn" type="button" title="Logout" aria-label="Logout"><i data-lucide="log-out"></i></button>
          </div>
        </div>
      </div>
    </nav>

    <div class="alert d-none" id="appMessage" role="alert"></div>

    <main class="world-shell" aria-label="Hunter world">
      <section class="world-map-panel" aria-label="World map">
        <div class="world-canvas-host" id="worldCanvasHost" tabindex="0" aria-label="World map"></div>
        <div class="world-map-status" aria-live="polite">
          <button class="world-position-button" id="worldPositionButton" type="button" title="Center Hunter" aria-label="Center Hunter">
            <i data-lucide="crosshair"></i>
            <strong id="worldPositionChip">0, 0</strong>
          </button>
          <span id="worldZoomChip">100%</span>
        </div>
        <div class="world-target-tooltip d-none" id="worldTargetTooltip" aria-live="polite"></div>
        <div class="world-encounter-tooltip d-none" id="worldEncounterTooltip" aria-live="polite"></div>
        <div class="world-loading" id="worldLoading">Loading world...</div>
      </section>

      <aside class="world-side-panel" id="worldSidePanel" aria-label="World status">
        <button class="world-side-toggle" id="worldSideToggle" type="button" aria-expanded="false" aria-controls="worldSideContent">
          <span>World Status</span>
          <i data-lucide="chevron-up"></i>
        </button>

        <div class="world-side-content" id="worldSideContent">
          <section class="world-panel-block" aria-labelledby="worldTeamHeading">
            <div class="world-block-heading">
              <h2 id="worldTeamHeading">Active Team</h2>
              <a class="world-panel-link" href="/camp">Edit Team</a>
            </div>
            <div class="world-team-summary" id="worldTeamSummary"></div>
          </section>

          <section class="world-panel-block" aria-labelledby="worldEncounterHeading">
            <div class="world-block-heading">
              <h2 id="worldEncounterHeading">Hunters in area 0, 0</h2>
            </div>
            <div class="world-encounter-list" id="worldEncounterList"></div>
          </section>

          <section class="world-panel-block" aria-labelledby="worldTravelHeading">
            <div class="world-block-heading">
              <h2 id="worldTravelHeading">Travel</h2>
            </div>
            <div class="world-travel-panel" id="worldTravelPanel"></div>
          </section>
        </div>
      </aside>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/vendor/lucide/lucide.min.js"></script>
    <script src="/app/js/icons.js?v=20260622-alerts-v1"></script>
    <script src="/app/js/api-config.js"></script>
    <script src="/app/js/session.js"></script>
    <script src="/app/js/navigation.js"></script>
    <script src="/vendor/pixi/pixi.min.js"></script>
    <script type="module" src="/app/js/world-ui.js?v=20260627-world-sheet-v3"></script>
  </body>
</html>
