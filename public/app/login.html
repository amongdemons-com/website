<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Login | Among Demons</title>
    <meta name="description" content="Log in to your Among Demons player account.">
    <link rel="canonical" href="https://amongdemons.com/login">
    <link rel="icon" href="/app/images/amongdemons.ico" type="image/x-icon">
    <meta property="og:site_name" content="Among Demons">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Login | Among Demons">
    <meta property="og:description" content="Log in to your Among Demons player account.">
    <meta property="og:url" content="https://amongdemons.com/login">
    <meta property="og:image" content="https://amongdemons.com/app/images/amongdemons_logo_white_text_bottom_1000x1000.png">
    <meta property="og:image:width" content="1000">
    <meta property="og:image:height" content="1000">
    <meta property="og:image:alt" content="Among Demons logo">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Login | Among Demons">
    <meta name="twitter:description" content="Log in to your Among Demons player account.">
    <meta name="twitter:image" content="https://amongdemons.com/app/images/amongdemons_logo_white_text_bottom_1000x1000.png">
    <meta name="twitter:image:alt" content="Among Demons logo">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/app/css/main.css?v=20260620-shared-nav-v2" rel="stylesheet">
  </head>
  <body data-auth-mode="login">
    <nav class="navbar navbar-expand-xl navbar-dark bg-dark border-bottom game-shell-nav" aria-label="Game navigation">
      <div class="container-fluid">
        <a class="navbar-brand game-shell-brand" href="/" aria-label="Among Demons home">
          <img src="/app/images/amongdemons_logo_250x250.png" alt="Among Demons logo" class="logo-nav" width="40" height="40" loading="eager">
          <span class="game-shell-brand-copy"><span class="game-shell-brand-name">Among Demons</span></span>
        </a>
        <button class="navbar-toggler game-shell-toggle" type="button" data-bs-toggle="collapse" data-bs-target="#loginGameNav" aria-controls="loginGameNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="loginGameNav">
          <ul class="navbar-nav game-shell-tabs me-auto">
            <li class="nav-item"><a class="nav-link game-nav-link" href="/camp" data-game-route="camp"><i data-lucide="tent"></i><span>Camp</span></a></li>
            <li class="nav-item"><a class="nav-link game-nav-link" href="/dungeon" data-game-route="dungeon"><i data-lucide="swords"></i><span>Dungeon</span></a></li>
            <li class="nav-item"><a class="nav-link game-nav-link is-locked" href="#pvp" data-game-route="pvp" aria-disabled="true" data-disabled-link><i data-lucide="shield"></i><span>PVP</span></a></li>
            <li class="nav-item"><a class="nav-link game-nav-link" href="/demons" data-game-route="demons"><i data-lucide="skull"></i><span>Demons</span></a></li>
            <li class="nav-item"><a class="nav-link game-nav-link" href="/collection" data-game-route="collection"><i data-lucide="grid-3x3"></i><span>Collection</span></a></li>
            <li class="nav-item"><a class="nav-link game-nav-link" href="/rankings" data-game-route="rankings"><i data-lucide="trophy"></i><span>Rankings</span></a></li>
          </ul>
          <div class="nav-auth-actions game-shell-auth-actions" data-nav-auth-actions>
            <a class="btn btn-outline-light btn-sm" href="/register">Register</a>
          </div>
          <div class="nav-account d-none" data-nav-account>
            <span class="nav-balance" data-nav-souls title="Soul balance"><span class="soul-amount nav-soul-amount"><img src="/app/images/assets/soul.svg" class="ad-icon soul-icon" alt="" width="16" height="16" aria-hidden="true"><span class="soul-amount-value">-</span><span class="soul-amount-label">Souls</span></span></span>
            <a class="nav-player" href="/camp" title="Go to camp"><span class="nav-player-avatar" aria-hidden="true"><img src="/app/images/demons/thumbnails/1.png" alt="" width="34" height="34" data-nav-profile-image></span><span class="nav-player-copy"><span data-nav-player-name></span><small data-nav-player-level>Level -</small></span></a>
            <a class="nav-settings-link" href="#settings" aria-disabled="true" data-disabled-link title="Settings" aria-label="Settings"><i data-lucide="settings"></i></a>
            <button class="btn nav-logout-btn" id="logoutBtn" type="button" title="Logout" aria-label="Logout"><i data-lucide="log-out"></i></button>
          </div>
        </div>
      </div>
    </nav>

    <main class="container auth-shell">
      <section class="auth-layout">
        <div class="card auth-card">
          <div class="card-body auth-card-body">
              <h1 class="auth-title">Log in</h1>
              <div class="alert d-none" id="authMessage" role="alert"></div>
              <div class="auth-provider-grid" aria-label="Social login options">
                <a class="btn oauth-btn oauth-google" href="/api/auth/oauth/google?mode=login" data-oauth-provider="google" aria-label="Continue with Google" title="Continue with Google">
                  <img class="oauth-brand-icon" src="/app/images/assets/oauth-google.svg" alt="" width="20" height="20" aria-hidden="true">
                  <span class="visually-hidden">Continue with Google</span>
                </a>
                <a class="btn oauth-btn oauth-discord" href="/api/auth/oauth/discord?mode=login" data-oauth-provider="discord" aria-label="Continue with Discord" title="Continue with Discord">
                  <img class="oauth-brand-icon" src="/app/images/assets/oauth-discord.svg" alt="" width="20" height="20" aria-hidden="true">
                  <span class="visually-hidden">Continue with Discord</span>
                </a>
              </div>
              <div class="auth-divider"><span>or use username</span></div>
              <form id="authForm" class="auth-form">
                <div class="auth-field">
                  <label class="form-label" for="username">Username</label>
                  <input class="form-control" id="username" name="username" autocomplete="username" required>
                </div>
                <div class="auth-field">
                  <label class="form-label" for="password">Password</label>
                  <div class="auth-password-field">
                    <input class="form-control" id="password" name="password" type="password" autocomplete="current-password" required>
                    <button class="auth-password-toggle" type="button" data-password-toggle="password" aria-label="Show password" aria-controls="password">
                      <span class="password-toggle-icon password-toggle-show"><i data-lucide="eye"></i></span>
                      <span class="password-toggle-icon password-toggle-hide"><i data-lucide="eye-off"></i></span>
                    </button>
                  </div>
                </div>
                <button class="btn btn-primary auth-submit" type="submit">
                  <i data-lucide="log-in"></i>
                  Enter
                </button>
              </form>
              <div class="auth-switch-link">
              <a href="/register">Create a new hunter</a>
              </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer py-3 mt-4 border-top">
      <div class="container text-center text-body-secondary">
        <p>&copy; 2026 Among Demons. Code licensed under MIT.</p>
        <nav class="footer-links" aria-label="Legal links">
          <a href="/privacy">Privacy Policy</a>
          <a href="/terms">Terms of Service</a>
        </nav>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/vendor/lucide/lucide.min.js"></script>
    <script src="/app/js/icons.js"></script>
    <script src="/app/js/api-config.js"></script>
    <script src="/app/js/session.js"></script>
    <script src="/app/js/navigation.js"></script>
    <script src="/app/js/auth-ui.js"></script>
  </body>
</html>
