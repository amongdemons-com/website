<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Login | Among Demons</title>
    <meta name="description" content="Log in to your Among Demons player account.">
    <link rel="canonical" href="https://amongdemons.com/login">
    <link rel="icon" href="/app/images/amongdemons.ico" type="image/x-icon">
    <meta property="og:site_name" content="Among Demons">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Login | Among Demons">
    <meta property="og:description" content="Log in to your Among Demons player account.">
    <meta property="og:url" content="https://amongdemons.com/login">
    <meta property="og:image" content="https://amongdemons.com/app/images/amongdemons_logo_white_text_bottom_1000x1000.png">
    <meta property="og:image:width" content="1000">
    <meta property="og:image:height" content="1000">
    <meta property="og:image:alt" content="Among Demons logo">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Login | Among Demons">
    <meta name="twitter:description" content="Log in to your Among Demons player account.">
    <meta name="twitter:image" content="https://amongdemons.com/app/images/amongdemons_logo_white_text_bottom_1000x1000.png">
    <meta name="twitter:image:alt" content="Among Demons logo">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/app/css/main.css" rel="stylesheet">
  </head>
  <body data-auth-mode="login">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom">
      <div class="container-fluid">
        <a class="navbar-brand" href="/">
          <img src="/app/images/amongdemons_logo_250x250.png" alt="Among Demons logo" class="d-inline-block align-middle me-2 logo-nav" width="48" height="48" loading="eager" style="width: 48px; height: 48px;">
          Among Demons
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav me-auto">
            <li class="nav-item"><a class="nav-link" href="/demons">Demons</a></li>
            <li class="nav-item"><a class="nav-link" href="/dungeon">Dungeon</a></li>
            <li class="nav-item"><a class="nav-link" href="/collection">Collection</a></li>
            <li class="nav-item"><a class="nav-link" href="/rankings">Rankings</a></li>
          </ul>
          <div class="d-flex gap-2">
            <a class="btn btn-outline-light btn-sm" href="/register">Register</a>
          </div>
        </div>
      </div>
    </nav>

    <main class="container my-4 auth-shell">
      <section class="row justify-content-center align-items-center g-4">
        <div class="col-12 col-lg-5">
          <img class="img-fluid auth-mark" src="/app/images/amongdemons_logo_white_text_bottom_1000x1000.png" alt="Among Demons logo" width="1000" height="1000" loading="eager" decoding="async">
        </div>
        <div class="col-12 col-lg-5">
          <div class="card">
            <div class="card-header">
              <h1 class="h4 mb-0">Log In</h1>
            </div>
            <div class="card-body">
              <div class="alert d-none" id="authMessage" role="alert"></div>
              <form id="authForm">
                <div class="mb-3">
                  <label class="form-label" for="username">Username</label>
                  <input class="form-control" id="username" name="username" autocomplete="username" required>
                </div>
                <div class="mb-3">
                  <label class="form-label" for="password">Password</label>
                  <input class="form-control" id="password" name="password" type="password" autocomplete="current-password" required>
                </div>
                <button class="btn btn-primary w-100" type="submit">
                  <i data-lucide="log-in"></i>
                  Enter
                </button>
              </form>
            </div>
            <div class="card-footer text-center">
              <a href="/register">Create a new hunter</a>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="py-3 mt-4 border-top">
      <div class="container text-center text-body-secondary">
        <p>&copy; 2026 Among Demons. Code licensed under MIT.</p>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/vendor/lucide/lucide.min.js"></script>
    <script src="/app/js/icons.js"></script>
    <script src="/app/js/navigation.js"></script>
    <script src="/app/js/auth-ui.js"></script>
  </body>
</html>
