<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="index, follow">
    <title>Demon Collection | Among Demons Collect Them All</title>
    <meta name="description" content="Browse the Among Demons collection checklist, discover every rarity slot, and start collecting demons through roguelike dungeon runs.">
    <link rel="canonical" href="https://amongdemons.com/collection">
    <link rel="icon" href="/app/images/amongdemons.ico" type="image/x-icon">
    <meta property="og:site_name" content="Among Demons">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Demon Collection | Among Demons Collect Them All">
    <meta property="og:description" content="Browse the Among Demons collection checklist, discover every rarity slot, and start collecting demons through roguelike dungeon runs.">
    <meta property="og:url" content="https://amongdemons.com/collection">
    <meta property="og:image" content="https://amongdemons.com/app/images/assets/background/amongdemons_collection.png">
    <meta property="og:image:width" content="1600">
    <meta property="og:image:height" content="900">
    <meta property="og:image:alt" content="Among Demons demon collection checklist artwork">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Demon Collection | Among Demons Collect Them All">
    <meta name="twitter:description" content="Browse the Among Demons collection checklist, discover every rarity slot, and start collecting demons through roguelike dungeon runs.">
    <meta name="twitter:image" content="https://amongdemons.com/app/images/assets/background/amongdemons_collection.png">
    <meta name="twitter:image:alt" content="Among Demons demon collection checklist artwork">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/app/css/main.css?v=20260618-train-icon-v1" rel="stylesheet">
  </head>
  <body class="collection-page">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom">
      <div class="container-fluid">
        <a class="navbar-brand" href="/">
          <img src="/app/images/amongdemons_logo_250x250.png" alt="Among Demons logo" class="d-inline-block align-middle me-2 logo-nav" width="48" height="48" loading="eager" style="width: 48px; height: 48px;">
          Among Demons
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav me-auto">
            <li class="nav-item"><a class="nav-link" href="/demons">Demons</a></li>
            <li class="nav-item"><a class="nav-link" href="/dungeon">Dungeon</a></li>
            <li class="nav-item"><a class="nav-link active" href="/collection">Collection</a></li>
            <li class="nav-item"><a class="nav-link" href="/rankings">Rankings</a></li>
          </ul>
          <div class="nav-auth-actions" data-nav-auth-actions>
            <a class="btn btn-outline-light btn-sm" href="/login">Login</a>
            <a class="btn btn-primary btn-sm" href="/register">Register</a>
          </div>
          <div class="nav-account d-none" data-nav-account>
            <span class="nav-balance" id="navSoulBalance" data-nav-souls role="status" aria-live="polite" aria-atomic="true" title="Soul balance">
              <span class="soul-amount nav-soul-amount" aria-label="Souls loading">
                <img src="/app/images/assets/soul.svg" class="ad-icon soul-icon" alt="" width="16" height="16" loading="lazy" aria-hidden="true">
                <span class="soul-amount-value">-</span>
                <span class="soul-amount-label">Souls</span>
              </span>
            </span>
            <a class="nav-player" href="/camp" title="Go to camp">
              <i data-lucide="user"></i>
              <span id="navPlayerName" data-nav-player-name></span>
            </a>
            <button class="btn nav-logout-btn btn-icon-only" id="logoutBtn" type="button" title="Logout" aria-label="Logout">
              <i data-lucide="log-out"></i>
            </button>
          </div>
        </div>
      </div>
    </nav>

    <main class="container my-4">
      <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-end gap-3 py-3 mb-4">
        <div>
          <h1 class="display-5 mb-1">Demon Collection</h1>
          <p class="mb-0 text-muted" id="collectionSummary">Browse every demon slot and collect them all through dungeon runs.</p>
        </div>
        <div class="d-flex flex-wrap gap-2">
          <a class="btn btn-primary" href="/dungeon">
            <i data-lucide="play"></i>
            Dungeon
          </a>
        </div>
      </div>

      <section class="card collection-gallery-card">
        <div class="card-header d-flex flex-column flex-xl-row align-items-xl-center justify-content-between gap-3">
          <div class="d-flex flex-wrap align-items-center justify-content-between gap-3 w-100 w-xl-auto">
            <span>Collection Checklist</span>
            <span class="collection-count" id="collectionCount">0</span>
            <button class="btn btn-outline-light btn-sm collection-filters-toggle" id="filtersToggleBtn" type="button" aria-expanded="false" aria-controls="collectionControlsPanel">
              <i data-lucide="sliders-horizontal"></i>
              <span>Show Filters</span>
            </button>
          </div>
          <div class="collection-controls" id="collectionControlsPanel">
            <label class="visually-hidden" for="typeFilter">Demon Type</label>
            <select class="form-select form-select-sm" id="typeFilter" aria-label="Demon Type">
              <option value="all">All Types</option>
            </select>
            <label class="visually-hidden" for="rarityFilter">Rarity</label>
            <select class="form-select form-select-sm" id="rarityFilter" aria-label="Rarity">
              <option value="all">All Rarities</option>
            </select>
            <label class="visually-hidden" for="sortOrder">Order By</label>
            <select class="form-select form-select-sm" id="sortOrder" aria-label="Order By">
              <option value="default">All Stats</option>
              <option value="atk">Damage</option>
              <option value="speed">Speed</option>
              <option value="hp">HP</option>
            </select>
            <label class="collection-checkbox" for="hideMissingFilter">
              <input class="form-check-input" type="checkbox" id="hideMissingFilter">
              <span>Hide missing</span>
            </label>
          </div>
        </div>
        <div class="card-body">
          <div class="collection-card-grid demon-card-grid" id="collectionGrid"></div>
        </div>
      </section>
    </main>

    <footer class="site-footer py-3 mt-4 border-top">
      <div class="container text-center text-body-secondary">
        <p>&copy; 2026 Among Demons. Code licensed under MIT.</p>
        <nav class="footer-links" aria-label="Legal links">
          <a href="/privacy">Privacy Policy</a>
          <a href="/terms">Terms of Service</a>
        </nav>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/vendor/lucide/lucide.min.js"></script>
    <script src="/app/js/icons.js"></script>
    <script src="/app/js/api-config.js"></script>
    <script src="/app/js/session.js"></script>
    <script src="/app/js/navigation.js"></script>
    <script src="/app/js/demon-cards.js"></script>
    <script src="/app/js/collection-ui.js"></script>
  </body>
</html>
