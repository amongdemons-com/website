<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
  <head>
    <link rel="icon" href="/app/images/amongdemons.ico" type="image/x-icon">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rankings - Among Demons</title>
    <meta name="description" content="View the top Among Demons hunters.">
    <meta property="og:image" content="/app/images/demons/thumbnails/1.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/app/css/main.css" rel="stylesheet">
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom">
      <div class="container-fluid">
        <a class="navbar-brand" href="/">
          <img src="/app/images/amongdemons_logo_250x250.png" alt="" class="d-inline-block align-middle me-2 logo-nav" style="width: 48px; height: 48px;">
          Among Demons
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav me-auto">
            <li class="nav-item dropdown">
              <a class="nav-link dropdown-toggle" href="#" id="demonsDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">Demons</a>
              <ul class="dropdown-menu dropdown-menu-end" id="demonTypesDropdown"></ul>
            </li>
            <li class="nav-item"><a class="nav-link" href="/play">Play</a></li>
            <li class="nav-item"><a class="nav-link" href="/dungeon">Dungeon</a></li>
            <li class="nav-item"><a class="nav-link active" href="/rankings">Rankings</a></li>
          </ul>
          <div class="d-flex align-items-center gap-2">
            <a class="btn btn-outline-light btn-sm" href="/login">Login</a>
            <a class="btn btn-primary btn-sm" href="/register">Register</a>
          </div>
        </div>
      </div>
    </nav>

    <main class="container my-4">
      <div class="py-3 mb-4">
        <div>
          <h1 class="display-5 mb-1">Rankings</h1>
          <p class="mb-0 text-muted">Top 100 hunters.</p>
        </div>
      </div>

      <div class="alert d-none" id="rankMessage" role="alert"></div>

      <section class="card">
        <div class="table-responsive">
          <table class="table table-dark table-hover align-middle mb-0 rank-table">
            <thead>
              <tr>
                <th scope="col">#</th>
                <th scope="col">Hunter</th>
                <th scope="col"><a href="/rankings" class="rank-sort-link" data-sort="level">Level</a></th>
                <th scope="col"><a href="/rankings/souls" class="rank-sort-link" data-sort="souls">Souls</a></th>
              </tr>
            </thead>
            <tbody id="rankBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <footer class="py-3 my-4 border-top">
      <div class="container text-center text-body-secondary">
        <p>&copy; 2026 Among Demons. All rights reserved.</p>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/app/js/navigation.js"></script>
    <script src="/app/js/session.js"></script>
    <script src="/app/js/rankings-ui.js"></script>
  </body>
</html>
