<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="index, follow">
    <title>Dungeon Rankings | Among Demons Browser RPG</title>
    <meta name="description" content="View Among Demons dungeon rankings for the browser RPG roguelike auto-battler and compare the deepest surviving teams.">
    <meta name="keywords" content="demon collection game, browser RPG, roguelike dungeon game, auto-battler, collect demons, build your team, survive dungeon runs">
    <link rel="canonical" href="https://amongdemons.com/rankings">
    <link rel="icon" href="/app/images/amongdemons.ico" type="image/x-icon">
    <meta property="og:site_name" content="Among Demons">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Dungeon Rankings | Among Demons Browser RPG">
    <meta property="og:description" content="View Among Demons dungeon rankings for the browser RPG roguelike auto-battler and compare the deepest surviving teams.">
    <meta property="og:url" content="https://amongdemons.com/rankings">
    <meta property="og:image" content="https://amongdemons.com/app/images/assets/background/amongdemons_rankings.png">
    <meta property="og:image:width" content="1600">
    <meta property="og:image:height" content="900">
    <meta property="og:image:alt" content="Among Demons dungeon rankings artwork">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Dungeon Rankings | Among Demons Browser RPG">
    <meta name="twitter:description" content="View Among Demons dungeon rankings for the browser RPG roguelike auto-battler and compare the deepest surviving teams.">
    <meta name="twitter:image" content="https://amongdemons.com/app/images/assets/background/amongdemons_rankings.png">
    <meta name="twitter:image:alt" content="Among Demons dungeon rankings artwork">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/app/css/main.css" rel="stylesheet">
  </head>
  <body class="rankings-page">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom">
      <div class="container-fluid">
        <a class="navbar-brand" href="/">
          <img src="/app/images/amongdemons_logo_250x250.png" alt="Among Demons logo" class="d-inline-block align-middle me-2 logo-nav" width="48" height="48" loading="eager" style="width: 48px; height: 48px;">
          Among Demons
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav me-auto">
            <li class="nav-item"><a class="nav-link" href="/dungeon">Dungeon</a></li>
            <li class="nav-item"><a class="nav-link" href="/demons">Demons</a></li>
            <li class="nav-item"><a class="nav-link" href="/collection">Collection</a></li>
            <li class="nav-item"><a class="nav-link active" href="/rankings">Rankings</a></li>
          </ul>
          <div class="nav-auth-actions" data-nav-auth-actions>
            <a class="btn btn-outline-light btn-sm" href="/login">Login</a>
            <a class="btn btn-primary btn-sm" href="/register">Register</a>
          </div>
          <div class="nav-account d-none" data-nav-account>
            <span class="nav-balance" id="navSoulBalance" data-nav-souls role="status" aria-live="polite" aria-atomic="true" title="Soul balance">
              <span class="soul-amount nav-soul-amount" aria-label="Souls loading">
                <img src="/app/images/assets/soul.svg" class="ad-icon soul-icon" alt="" width="16" height="16" loading="lazy" aria-hidden="true">
                <span class="soul-amount-value">-</span>
                <span class="soul-amount-label">Souls</span>
              </span>
            </span>
            <a class="nav-player" href="/camp" title="Go to camp">
              <i data-lucide="user"></i>
              <span id="navPlayerName" data-nav-player-name></span>
            </a>
            <button class="btn nav-logout-btn btn-icon-only" id="logoutBtn" type="button" title="Logout" aria-label="Logout">
              <i data-lucide="log-out"></i>
            </button>
          </div>
        </div>
      </div>
    </nav>

    <main class="container my-4">
      <div class="py-3 mb-4">
        <div>
          <h1 class="display-5 mb-1">Rankings</h1>
          <p class="mb-0 text-muted">Deepest dungeon conquerors.</p>
        </div>
      </div>

      <div class="alert d-none" id="rankMessage" role="alert"></div>

      <section class="card">
        <h2 class="visually-hidden">Dungeon leaderboard</h2>
        <div class="table-responsive">
          <table class="table table-dark table-hover align-middle mb-0 rank-table">
            <thead>
              <tr>
                <th scope="col">#</th>
                <th scope="col">Hunter</th>
                <th scope="col"><a href="/rankings" class="rank-sort-link" data-sort="floor">Highest Floor</a></th>
                <th scope="col"><a href="/rankings/level" class="rank-sort-link" data-sort="level">Level</a></th>
                <th scope="col"><a href="/rankings/souls" class="rank-sort-link" data-sort="souls"><span class="rank-sort-label">Souls</span></a></th>
              </tr>
            </thead>
            <tbody id="rankBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <footer class="py-3 mt-4 border-top">
      <div class="container text-center text-body-secondary">
        <p>&copy; 2026 Among Demons. Code licensed under MIT.</p>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/vendor/lucide/lucide.min.js"></script>
    <script src="/app/js/icons.js"></script>
    <script src="/app/js/session.js"></script>
    <script src="/app/js/navigation.js"></script>
    <script src="/app/js/rankings-ui.js"></script>
  </body>
</html>
