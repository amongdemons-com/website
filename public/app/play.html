<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
  <head>
    <link rel="icon" href="/app/images/amongdemons.ico" type="image/x-icon">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Play - Among Demons</title>
    <meta name="description" content="Play and test the Among Demons prototype.">
    <meta property="og:image" content="/app/images/demons/thumbnails/1.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/app/css/main.css" rel="stylesheet">
  </head>
  <body class="play-page">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom">
      <div class="container-fluid">
        <a class="navbar-brand" href="/">
          <img src="/app/images/amongdemons_logo_250x250.png" alt="" class="d-inline-block align-middle me-2 logo-nav" style="width: 48px; height: 48px;">
          Among Demons
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav me-auto">
            <li class="nav-item dropdown">
              <a class="nav-link dropdown-toggle" href="#" id="demonsDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">Demons</a>
              <ul class="dropdown-menu dropdown-menu-end" id="demonTypesDropdown"></ul>
            </li>
            <li class="nav-item"><a class="nav-link active" href="/play">Play</a></li>
            <li class="nav-item"><a class="nav-link" href="/dungeon">Dungeon</a></li>
            <li class="nav-item"><a class="nav-link" href="/collection">Collection</a></li>
            <li class="nav-item"><a class="nav-link" href="/summon">Summon</a></li>
            <li class="nav-item"><a class="nav-link" href="/rankings">Rankings</a></li>
          </ul>
          <div class="d-flex align-items-center gap-2">
            <span class="text-secondary" id="navPlayerName"></span>
            <button class="btn btn-outline-danger btn-sm" id="logoutBtn" type="button" title="Logout">
              <i class="bi bi-box-arrow-right"></i>
            </button>
          </div>
        </div>
      </div>
    </nav>

    <main class="container my-4">
      <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-end gap-3 py-3 mb-4">
        <div>
          <h1 class="display-5 mb-1">Play</h1>
          <p class="mb-0 text-muted" id="welcomeText">Loading hunter...</p>
        </div>
        <div class="d-flex flex-wrap gap-2">
          <a class="btn btn-primary" href="/dungeon">
            <i class="bi bi-play-fill"></i>
            Dungeon
          </a>
          <button class="btn btn-outline-light" id="refreshBtn" type="button" title="Refresh">
            <i class="bi bi-arrow-clockwise"></i>
          </button>
        </div>
      </div>

      <div class="alert d-none" id="appMessage" role="alert"></div>

      <section class="row g-3 mb-4">
        <div class="col-12">
          <div class="card h-100">
            <div class="card-header">Hunter</div>
            <div class="card-body">
              <div class="row text-center g-2">
                <div class="col-4">
                  <div class="stat-box">
                    <span id="levelStat">-</span>
                    <small>Level</small>
                  </div>
                </div>
                <div class="col-4">
                  <div class="stat-box">
                    <span id="xpStat">-</span>
                    <small>XP</small>
                  </div>
                </div>
                <div class="col-4">
                  <div class="stat-box">
                    <span id="soulsStat">-</span>
                    <small>Souls</small>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="row g-3">
        <div class="col-12 col-xl-8">
          <div class="card">
            <div class="card-header d-flex align-items-center justify-content-between gap-3">
              <span>Collection</span>
              <a class="btn btn-outline-light btn-sm" href="/collection">View All</a>
            </div>
            <div class="card-body">
              <div class="row row-cols-1 row-cols-md-3 g-3 demon-card-grid" id="collectionGrid"></div>
            </div>
          </div>
        </div>
        <div class="col-12 col-xl-4">
          <div class="card">
            <div class="card-header">System</div>
            <div class="card-body">
              <button class="btn btn-outline-light w-100 mb-3" id="adminCheckBtn" type="button">
                <i class="bi bi-sliders"></i>
                Balance Check
              </button>
              <p class="text-muted mb-0" id="adminCheckResult">Not checked.</p>
            </div>
          </div>
        </div>
      </section>

    </main>

    <footer class="py-3 mt-4 border-top">
      <div class="container text-center text-body-secondary">
        <p>&copy; 2026 Among Demons. All rights reserved.</p>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/app/js/navigation.js"></script>
    <script src="/app/js/session.js"></script>
    <script src="/app/js/demon-cards.js"></script>
    <script src="/app/js/play-ui.js"></script>
  </body>
</html>
