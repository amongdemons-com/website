<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
  <head>
    <link rel="icon" href="/app/images/amongdemons.ico" type="image/x-icon">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Among Demons</title>
    <meta name="description" content="Create an Among Demons player account.">
    <meta property="og:image" content="/app/images/demons/thumbnails/1.png">    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/app/css/main.css" rel="stylesheet">
  </head>
  <body data-auth-mode="register">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom">
      <div class="container-fluid">
        <a class="navbar-brand" href="/">
          <img src="/app/images/amongdemons_logo_250x250.png" alt="" class="d-inline-block align-middle me-2 logo-nav" style="width: 48px; height: 48px;">
          Among Demons
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav me-auto">
            <li class="nav-item dropdown">
              <a class="nav-link dropdown-toggle" href="#" id="demonsDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">Demons</a>
              <ul class="dropdown-menu dropdown-menu-end" id="demonTypesDropdown"></ul>
            </li>
            <li class="nav-item"><a class="nav-link" href="/play">Play</a></li>
            <li class="nav-item"><a class="nav-link" href="/dungeon">Dungeon</a></li>
            <li class="nav-item"><a class="nav-link" href="/collection">Collection</a></li>
            <li class="nav-item"><a class="nav-link" href="/rankings">Rankings</a></li>
          </ul>
          <div class="d-flex gap-2">
            <a class="btn btn-outline-light btn-sm" href="/login">Login</a>
          </div>
        </div>
      </div>
    </nav>

    <main class="container my-4 auth-shell">
      <section class="row justify-content-center align-items-center g-4">
        <div class="col-12 col-lg-5">
          <img class="img-fluid auth-mark" src="/app/images/amongdemons_logo_white_text_bottom_1000x1000.png" alt="Among Demons">
        </div>
        <div class="col-12 col-lg-5">
          <div class="card">
            <div class="card-header">
              <h1 class="h4 mb-0">Register</h1>
            </div>
            <div class="card-body">
              <div class="alert d-none" id="authMessage" role="alert"></div>
              <form id="authForm">
                <div class="mb-3">
                  <label class="form-label" for="username">Username</label>
                  <input class="form-control" id="username" name="username" autocomplete="username" minlength="3" required>
                </div>
                <div class="mb-3">
                  <label class="form-label" for="email">Email</label>
                  <input class="form-control" id="email" name="email" type="email" autocomplete="email">
                </div>
                <div class="mb-3">
                  <label class="form-label" for="password">Password</label>
                  <input class="form-control" id="password" name="password" type="password" autocomplete="new-password" minlength="6" required>
                </div>
                <button class="btn btn-primary w-100" type="submit">
                  <i data-lucide="user-plus"></i>
                  Create Hunter
                </button>
              </form>
            </div>
            <div class="card-footer text-center">
              <a href="/login">I already have a hunter</a>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="py-3 mt-4 border-top">
      <div class="container text-center text-body-secondary">
        <p>&copy; 2026 Among Demons. All rights reserved.</p>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/vendor/lucide/lucide.min.js"></script>
    <script src="/app/js/icons.js"></script>
    <script src="/app/js/navigation.js"></script>
    <script src="/app/js/auth-ui.js"></script>
  </body>
</html>
